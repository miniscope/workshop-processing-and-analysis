# Single shared environment for the whole workshop.
#
# Goal: one install, one Jupyter kernel, for every module. CaMAP sets the
# modern floor (Python >=3.11, recent xarray/zarr/pyarrow/opencv), so the
# upstream tools must resolve against that. If `conda env create` or the
# capstone smoke test fails to resolve, the most likely offender is Minian
# (numba/numpy/zarr pins) — carve *only that tool* out into envs/ rather than
# fragmenting everything. See INSTALL.md.
#
# Everything pulls the newest release from PyPI except the eztrack fork, which
# installs from GitHub. Note: "newest" trades reproducibility for freshness —
# if you want the workshop frozen to a known-good set, pin versions here once
# the room is set (the CI smoke test will tell you when something drifts).

name: workshop
channels:
  - conda-forge

dependencies:
  - python=3.11
  - pip
  - jupyterlab
  - ipympl            # interactive matplotlib widgets (CaMAP browse_units)
  - ipywidgets
  # OASIS deconvolution needs a C compiler at build time; conda-forge ships
  # a prebuilt binary which avoids the source build on attendee machines.
  - oasis-deconv
  - pip:
      - minisim       # simulate miniscope recordings
      - minian        # CNMF processing -> traces & footprints
      - calab         # CaTune (tuning UI) + CaDecon (deconvolution)
      - camap         # capstone: place-cell analysis
      # eztrack fork: packaged v2.x (pip-installable, ships its notebooks)
      - "eztrack @ git+https://github.com/daharoni/ezTrack"
