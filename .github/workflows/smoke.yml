name: capstone-smoke

# Two gates that mirror the documented install path (INSTALL.md):
#
#   validate — fast (~30s): every committed notebook is well-formed and every
#              script/glue module byte-compiles. Catches a corrupted notebook
#              or a syntax error without waiting on the heavy stack.
#   smoke    — full: install the workshop env, register the `workshop` kernel,
#              fetch the prerecorded session, and run the capstone notebook
#              headless. Catches a broken install or upstream API drift in CI
#              rather than in front of the workshop room.
#
# Docs-only commits (**.md, LICENSE) are skipped — they can't break either gate.

on:
  push:
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

# A newer push to the same ref cancels an in-progress run for it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation tools
        run: python -m pip install --upgrade pip nbformat

      - name: Byte-compile scripts and glue
        run: python -m compileall -q scripts capstone/workshop_glue

      - name: Validate notebooks
        run: python scripts/validate_notebooks.py

  smoke:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      # Test both dependency sets; let each report independently rather than
      # one cancelling the other:
      #   requirements.lock — the reproducible set the workshop room runs on
      #   requirements.txt  — newest from PyPI, so upstream drift surfaces early
      fail-fast: false
      matrix:
        deps: [requirements.lock, requirements.txt]
    name: smoke (${{ matrix.deps }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.deps }}

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies (${{ matrix.deps }})
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ${{ matrix.deps }}

      - name: Register the workshop Jupyter kernel
        # Mirrors INSTALL.md step 3 — the capstone notebook is pinned to this kernel.
        run: python -m ipykernel install --user --name workshop --display-name "Workshop"

      - name: Fetch prerecorded session data
        run: python scripts/get_data.py --session prerecorded

      - name: Execute capstone notebook
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=1800 \
            capstone/camap_placecells.ipynb
