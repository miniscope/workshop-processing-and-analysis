name: capstone-smoke

# Runs the capstone notebook headless against the golden checkpoints, so a
# broken install or an upstream API drift is caught in CI rather than in front
# of the workshop room.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          # swap to the pinned set once development locks in:
          # python -m pip install -r requirements.lock

      - name: Fetch example data + checkpoints
        run: python scripts/download_data.py

      - name: Execute capstone notebook
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            capstone/camap_placecells.ipynb
