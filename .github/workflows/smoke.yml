name: capstone-smoke

# Two gates that mirror the documented install path (INSTALL.md):
#
#   validate — fast (~30s): every committed notebook is well-formed and every
#              script/glue module byte-compiles. Catches a corrupted notebook
#              or a syntax error without waiting on the heavy stack.
#   smoke    — full: install the workshop env, register the `workshop` kernel,
#              fetch the prerecorded session, and run the capstone notebook
#              headless. Catches a broken install or upstream API drift in CI
#              rather than in front of the workshop room.
#
# Docs-only commits (**.md, LICENSE) are skipped — they can't break either gate.

on:
  push:
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

# A newer push to the same ref cancels an in-progress run for it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation tools
        run: python -m pip install --upgrade pip nbformat

      - name: Byte-compile scripts and glue
        run: python -m compileall -q scripts capstone/workshop_glue

      - name: Validate notebooks
        run: python scripts/validate_notebooks.py

  smoke:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          # requirements.lock is a Windows-generated freeze (it pins pywinpty)
          # and won't install on the Linux runner — regenerate it cross-platform
          # before gating CI on it.

      - name: Register the workshop Jupyter kernel
        # Mirrors INSTALL.md step 3 — the capstone notebook is pinned to this kernel.
        run: python -m ipykernel install --user --name workshop --display-name "Workshop"

      # The capstone reads the processed stages + raw timestamps, never the raw
      # videos — so --skip-video pulls ~228 MB instead of the full 8.9 GB deposit.
      # Cache it so the fetch only hits the archive when get_data.py changes.
      - name: Cache prerecorded session data
        uses: actions/cache@v4
        with:
          path: data/sessions/prerecorded
          key: data-prerecorded-novideo-${{ hashFiles('scripts/get_data.py') }}-v1

      - name: Fetch prerecorded session data (no video)
        run: python scripts/get_data.py --session prerecorded --skip-video

      # The per-unit spatial-information shuffle test dominates runtime
      # (~20-50 min at the committed n_shuffles=500). A smoke run only needs the
      # pipeline to execute end-to-end, not full statistical power — drop it to
      # 50 here. The committed default (what participants run) is untouched.
      - name: Trim shuffle count for the smoke run
        run: |
          sed -i -E 's/^( *n_shuffles:).*/\1 50  # lowered for CI smoke/' \
            capstone/config/arena_config.yaml
          grep -n n_shuffles capstone/config/arena_config.yaml

      - name: Execute capstone notebook
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=1800 \
            capstone/camap_placecells.ipynb
